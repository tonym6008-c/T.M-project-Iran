<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Search Bar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .search-container {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <h1>Search</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Phone">
        <input type="text" id="ip" placeholder="IP Address">
        <input type="text" id="domain" placeholder="Domain">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="image" placeholder="Image URL">
        <input type="text" id="social" placeholder="Social Media Link">
        <input type="text" id="address" placeholder="Address">
        <button onclick="performSearch()">Search</button>
    </div>

    <script>
        function performSearch() {
            // Implement search functionality here
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const ip = document.getElementById('ip').value;
            const domain = document.getElementById('domain').value;
            const name = document.getElementById('name').value;
            const image = document.getElementById('image').value;
            const social = document.getElementById('social').value;
            const address = document.getElementById('address').value;

            // Search logic can be implemented here
            console.log({username, email, phone, ip, domain, name, image, social, address});
        }
    </script>
</body>
</html>
